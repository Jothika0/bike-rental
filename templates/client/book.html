{% extends 'base.html' %}
{% block content %}
<div class="auth-choice-container">
    <div class="glass-card" style="max-width: 500px; width: 100%;">
        <h2 style="text-align: center; color: var(--accent);">Book Bike</h2>
        {% if bike.image %}
        <div style="text-align: center; margin-bottom: 15px;">
            <img src="{{ url_for('static', filename='images/' + bike.image|replace('\\', '/')) }}" style="max-width: 90%; height: 200px; object-fit: contain; border-radius: 8px; background: rgba(0,0,0,0.05);">
        </div>
        {% endif %}
        <h4 style="text-align: center; margin-bottom: 20px;">{{ bike.name }} ({{ bike.type }}) - ₹{{ bike.price }}/hr</h4>
        
        <form method="POST">
            <div class="form-group">
                <label>Booking Date</label>
                <input type="date" name="booking_date" class="form-control" required>
            </div>
            <div class="form-group" style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>Start Time</label>
                    <input type="time" name="start_time" class="form-control" required>
                </div>
                <div style="flex: 1;">
                    <label>End Time</label>
                    <input type="time" name="end_time" class="form-control" required>
                </div>
            </div>
            <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 15px; padding: 15px; font-size: 1.1rem;">Confirm Availability & Proceed to Pay</button>
        </form>
        <div style="text-align: center; margin-top: 15px;">
            <a href="{{ url_for('client_catalog') }}">Cancel Booking</a>
        </div>
    </div>
</div>
{% endblock %}
