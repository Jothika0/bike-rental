{% extends 'base.html' %}
{% block content %}
<style>
    body { background-color: #f8fafc !important; color: #1f2937 !important; }
    .panel { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 800px; margin: 40px auto; border: 1px solid #e2e8f0; }
    .modern-table { width: 100%; border-collapse: collapse; margin-bottom: 20px;}
    .modern-table th { text-align: left; padding: 12px; border-bottom: 2px solid #e2e8f0; color: #64748b; }
    .modern-table td { padding: 15px 12px; border-bottom: 1px solid #e2e8f0; }
</style>
<div class="panel">
    <h2 style="margin-top:0; color:#10b981;">My Payments</h2>
    <table class="modern-table">
        <thead>
            <tr>
                <th>Payment ID</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Related Booking</th>
            </tr>
        </thead>
        <tbody>
            {% for p in payments %}
            <tr>
                <td><strong>#PAY-{{ p.id }}</strong></td>
                <td><strong style="color: #10b981;">₹ {{ p.amount }}</strong></td>
                <td><span style="background: #dcfce7; color: #16a34a; padding: 5px 12px; border-radius: 20px; font-weight: 600; font-size: 0.85rem;">{{ p.status }}</span></td>
                <td>For Booking ID: {{ p.booking_id }}</td>
            </tr>
            {% else %}
            <tr><td colspan="4" style="text-align:center; padding: 30px; color: #64748b;">No payments found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
    <div style="margin-top: 20px;">
        <a href="{{ url_for('client_dashboard') }}" class="btn" style="background: #e2e8f0; color: #475569; border-radius: 10px; padding: 10px 20px; font-weight: 600;">Return to Dashboard</a>
    </div>
</div>
{% endblock %}
