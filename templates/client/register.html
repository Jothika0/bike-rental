{% extends 'base.html' %}

{% block content %}
<div class="auth-choice-container" style="padding: 40px 20px;">
    <div class="glass-card" style="max-width: 500px; width: 100%;">
        <h2 style="text-align: center; color: var(--accent);">Client Registration</h2>
        <form method="POST" action="{{ url_for('client_register') }}" enctype="multipart/form-data">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Address</label>
                <textarea name="address" class="form-control" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label>Driving License Number</label>
                <input type="text" name="license_number" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Upload Driving License (Image)</label>
                <input type="file" name="license_image" class="form-control" accept="image/*" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Register</button>
        </form>
        <p style="text-align: center; margin-top: 15px;">Already have an account? <a href="{{ url_for('client_login') }}">Login here</a></p>
    </div>
</div>
{% endblock %}
