{% extends 'base.html' %}
{% block content %}
<div style="padding: 20px;">
    <h2>Available Bikes</h2>
    <a href="{{ url_for('client_dashboard') }}" class="btn btn-secondary" style="margin-bottom: 20px;">Back to Dashboard</a>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;">
        {% for bike in bikes %}
        <div class="glass-card" style="text-align: center; padding: 20px;">
            {% if bike.image %}
            <div style="width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 15px;">
                <img src="{{ url_for('static', filename='images/' + bike.image|replace('\\', '/')) }}" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px;">
            </div>
            {% endif %}
            <h3 style="margin: 0 0 10px 0; color: var(--accent);">{{ bike.name }}</h3>
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--text-secondary);">
                <span>Type: <b>{{ bike.type }}</b></span>
                <span>Rate: <b style="color: var(--text-primary);">₹{{ bike.price }}/hr</b></span>
            </div>
            <a href="{{ url_for('client_book', bike_id=bike.id) }}" class="btn btn-primary" style="width: 100%; box-sizing: border-box;">Book This Bike</a>
        </div>
        {% else %}
        <div class="glass-card" style="grid-column: 1 / -1; text-align: center;">
            <p>No bikes currently available.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
