{% extends 'base.html' %}

{% block content %}
<div class="auth-choice-container">
    <div class="glass-card choice-card">
        <h2 style="color: var(--danger);">Admin Registration</h2>
        <form method="POST" action="{{ url_for('admin_register') }}">
            <div class="form-group">
                <input type="text" name="username" class="form-control" placeholder="Choose Admin Username" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" class="form-control" placeholder="Create Password" required>
            </div>
            <button type="submit" class="btn btn-danger" style="width: 100%;">Register Admin</button>
        </form>
        <p style="margin-top: 15px;">Already an admin? <a href="{{ url_for('admin_login') }}">Login here</a></p>
    </div>
</div>
{% endblock %}
